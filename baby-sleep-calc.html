<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор сна малыша</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1f35;
    --surface: #232845;
    --surface2: #2d3460;
    --accent: #7c9fff;
    --accent2: #ff8fab;
    --accent3: #ffd166;
    --text: #e8ecff;
    --muted: #8891c0;
    --success: #6fcf97;
    --moon: #ffd166;
    --sun: #ffb347;
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 48px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(124,159,255,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,143,171,0.1) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 20px;
  }

  .norms-note {
    background: rgba(124,159,255,0.08);
    border: 1px solid rgba(124,159,255,0.2);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .norms-note strong { color: var(--accent); }

  /* ---- FIELD ---- */
  .field {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid rgba(124,159,255,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .field-label {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.3;
    flex: 1;
  }
  .field-label strong {
    display: block;
    color: var(--text);
    font-size: 0.93rem;
    font-weight: 700;
  }

  /* readonly display field */
  .field.readonly {
    border-color: rgba(255,209,102,0.2);
    background: rgba(255,209,102,0.05);
  }
  .field.readonly .field-label strong { color: var(--accent3); }

  .readonly-val {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--accent3);
    min-width: 60px;
    text-align: center;
    background: rgba(255,209,102,0.1);
    border-radius: 10px;
    padding: 8px 12px;
    border: 1px solid rgba(255,209,102,0.25);
  }

  /* Time spinner */
  .time-spinner {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 8px 10px;
    border: 1px solid rgba(124,159,255,0.2);
    flex-shrink: 0;
  }

  .unit-group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .spin-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 1rem;
    line-height: 1;
    padding: 3px 9px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .spin-btn:active { color: var(--accent2); }

  .unit-val {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--text);
    min-width: 34px;
    text-align: center;
    line-height: 1.1;
  }

  .time-sep {
    color: var(--accent);
    font-weight: 800;
    font-size: 1.3rem;
    padding: 0 2px;
  }

  /* Button */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, #5b7fff, #a06fff);
    color: white;
    margin-top: 6px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:active { opacity: 0.85; }

  /* ---- RESULTS ---- */
  .results { display: none; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    font-family: 'Baloo 2', cursive;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    margin: 20px 0 10px;
  }

  .timeline {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid rgba(124,159,255,0.15);
  }

  .tl-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }
  .tl-row:last-child { margin-bottom: 0; }

  .tl-dot {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .wake-dot  { background: rgba(255,179,71,0.2); }
  .sleep-dot { background: rgba(124,159,255,0.2); }
  .night-dot { background: rgba(255,209,102,0.2); }

  .tl-info { flex: 1; padding-top: 1px; }
  .tl-time  { font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 800; line-height: 1; }
  .tl-event { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-top: 1px; }
  .tl-sub   { font-size: 0.75rem; color: var(--muted); }

  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .result-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px 16px;
    border: 1px solid rgba(124,159,255,0.12);
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .result-card.nap::before   { background: linear-gradient(180deg, var(--accent2), #c084fc); }
  .result-card.night::before { background: linear-gradient(180deg, var(--moon), var(--accent)); }
  .result-card.wake::before  { background: linear-gradient(180deg, var(--sun), #ffd166); }
  .result-card.total::before { background: linear-gradient(180deg, var(--success), #4ecdc4); }

  .result-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; font-weight: 700; }
  .result-value { font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800; color: var(--text); line-height: 1; }
  .result-note  { font-size: 0.74rem; color: var(--muted); margin-top: 3px; }
  .result-note.warn { color: var(--accent3); }
  .result-note.good { color: var(--success); }
</style>
</head>
<body>

<h1>🌙 Сон малыша</h1>
<p class="subtitle">Расчёт расписания по вашим нормам</p>

<div class="norms-note">
  📊 Нормы: <strong>СВБ всегда 13:00 · СС 11:00 · ДС 1:35 · НС 9:25</strong><br>
  ⚡ Если вб1 растёт — вб2 уменьшается автоматически
</div>

<div id="fields"></div>

<button class="btn" onclick="calculate()">✨ Рассчитать расписание</button>

<div class="results" id="results">
  <div class="section-header">📅 Расписание дня</div>
  <div class="timeline" id="timeline"></div>

  <div class="section-header">📊 Итоги</div>
  <div class="grid2">
    <div class="result-card nap">
      <div class="result-title">🌤 Дневной сон</div>
      <div class="result-value" id="res-nap">—</div>
      <div class="result-note" id="res-nap-note"></div>
    </div>
    <div class="result-card night">
      <div class="result-title">🌙 Ночной сон</div>
      <div class="result-value" id="res-night">—</div>
      <div class="result-note" id="res-night-note"></div>
    </div>
    <div class="result-card total" style="grid-column: 1 / -1;">
      <div class="result-title">💤 Суммарный сон</div>
      <div class="result-value" id="res-total-sleep">—</div>
      <div class="result-note" id="res-sleep-note"></div>
    </div>
  </div>
</div>

<script>
const TOTAL_WAKE = 13 * 60; // фиксировано 13:00

const state = {
  wake: { h: 7, m: 0  },
  vb1:  { h: 5, m: 50 },
  nap:  { h: 1, m: 35 },
};

const FIELDS_CFG = [
  { key: 'wake', icon: '🌅', label: 'Время подъёма',             sub: 'Когда просыпается малыш',  maxH: 12, minH: 4 },
  { key: 'vb1',  icon: '⏳', label: '1-е бодрствование',         sub: 'До дневного сна',           maxH: 10, minH: 1 },
  { key: 'nap',  icon: '😴', label: 'Длительность дневного сна', sub: 'Сколько спит днём',         maxH: 4,  minH: 0 },
];

function pad(n) { return n.toString().padStart(2, '0'); }
function toMins(h, m) { return h * 60 + m; }
function minsToHM(m) { return { h: Math.floor(Math.abs(m) / 60), m: Math.abs(m) % 60 }; }
function fmtMins(m) { const x = minsToHM(m); return `${x.h}:${pad(x.m)}`; }
function fmtTime(mins) {
  let t = ((mins % 1440) + 1440) % 1440;
  return `${pad(Math.floor(t / 60))}:${pad(t % 60)}`;
}

function getVb2() {
  const vb1 = toMins(state.vb1.h, state.vb1.m);
  return TOTAL_WAKE - vb1;
}

function renderFields() {
  const vb2mins = getVb2();
  const vb2 = minsToHM(vb2mins);
  const vb2ok = vb2mins > 0;

  document.getElementById('fields').innerHTML = FIELDS_CFG.map(f => {
    const s = state[f.key];
    return `
    <div class="field">
      <div class="field-label">
        <strong>${f.icon} ${f.label}</strong>
        ${f.sub}
      </div>
      <div class="time-spinner">
        <div class="unit-group">
          <button class="spin-btn" onclick="adj('${f.key}','h',1,${f.maxH},${f.minH})">▲</button>
          <div class="unit-val" id="v-${f.key}-h">${pad(s.h)}</div>
          <button class="spin-btn" onclick="adj('${f.key}','h',-1,${f.maxH},${f.minH})">▼</button>
        </div>
        <div class="time-sep">:</div>
        <div class="unit-group">
          <button class="spin-btn" onclick="adj('${f.key}','m',5,59,0)">▲</button>
          <div class="unit-val" id="v-${f.key}-m">${pad(s.m)}</div>
          <button class="spin-btn" onclick="adj('${f.key}','m',-5,59,0)">▼</button>
        </div>
      </div>
    </div>`;
  }).join('') + `
    <div class="field readonly">
      <div class="field-label">
        <strong>⏳ 2-е бодрствование</strong>
        После ДС до ночи (авто)
      </div>
      <div class="readonly-val" id="vb2-display">${vb2ok ? `${vb2.h}:${pad(vb2.m)}` : '⚠️'}</div>
    </div>`;
}

function adj(key, unit, delta, maxH, minH) {
  const s = state[key];
  if (unit === 'h') {
    s.h = Math.max(minH, Math.min(maxH, s.h + delta));
  } else {
    s.m = ((s.m + delta) % 60 + 60) % 60;
  }
  // update just the changed value and vb2
  document.getElementById(`v-${key}-h`).textContent = pad(s.h);
  document.getElementById(`v-${key}-m`).textContent = pad(s.m);
  // update vb2 display
  const vb2mins = getVb2();
  const vb2 = minsToHM(vb2mins);
  const el = document.getElementById('vb2-display');
  if (el) el.textContent = vb2mins > 0 ? `${vb2.h}:${pad(vb2.m)}` : '⚠️';
}

const NORMS = { totalSleep: 660, nightSleep: 565, napSleep: 95 };

function diffNote(actual, norm) {
  const diff = actual - norm;
  if (Math.abs(diff) <= 5) return { text: '✅ По норме', cls: 'good' };
  return diff > 0
    ? { text: `▲ +${fmtMins(diff)} от нормы`, cls: 'warn' }
    : { text: `▼ −${fmtMins(-diff)} от нормы`, cls: 'warn' };
}

function setResult(id, noteId, val, norm) {
  document.getElementById(id).textContent = fmtMins(val);
  const n = diffNote(val, norm);
  const el = document.getElementById(noteId);
  el.textContent = n.text;
  el.className = `result-note ${n.cls}`;
}

function calculate() {
  const vb2mins = getVb2();
  if (vb2mins <= 0) {
    alert('⚠️ 1-е бодрствование слишком длинное! Уменьшите его.');
    return;
  }

  const wakeTime = toMins(state.wake.h, state.wake.m);
  const vb1      = toMins(state.vb1.h,  state.vb1.m);
  const napDur   = toMins(state.nap.h,  state.nap.m);
  const vb2      = vb2mins;

  const napStart   = wakeTime + vb1;
  const napPutDown = napStart - 20;
  const napEnd     = napStart + napDur;
  const bedtime    = napEnd + vb2;
  const bedPutDown = bedtime - 25;
  const nightSleep = (1440 - bedtime) + wakeTime;
  const totalSleep = napDur + nightSleep;

  const events = [
    { icon: '🌅', cls: 'wake-dot',  label: 'Подъём',               time: wakeTime,    sub: 'Начало дня' },
    { icon: '😴', cls: 'sleep-dot', label: 'Укладывание на ДС',     time: napPutDown,  sub: 'Начинаем ритуал' },
    { icon: '💤', cls: 'sleep-dot', label: 'Дневной сон',           time: napStart,    sub: `Длительность ${fmtMins(napDur)}` },
    { icon: '☀️', cls: 'wake-dot',  label: 'Пробуждение после ДС',  time: napEnd,      sub: `2-е бодрствование ${fmtMins(vb2)}` },
    { icon: '🌆', cls: 'night-dot', label: 'Укладывание на ночь',   time: bedPutDown,  sub: 'Начинаем ритуал' },
    { icon: '🌙', cls: 'night-dot', label: 'Ночной сон',            time: bedtime,     sub: `~${fmtMins(nightSleep)}` },
  ];

  document.getElementById('timeline').innerHTML = events.map(e => `
    <div class="tl-row">
      <div class="tl-dot ${e.cls}">${e.icon}</div>
      <div class="tl-info">
        <div class="tl-time">${fmtTime(e.time)}</div>
        <div class="tl-event">${e.label}</div>
        <div class="tl-sub">${e.sub}</div>
      </div>
    </div>`).join('');

  setResult('res-nap',         'res-nap-note',   napDur,     NORMS.napSleep);
  setResult('res-night',       'res-night-note', nightSleep, NORMS.nightSleep);
  setResult('res-total-sleep', 'res-sleep-note', totalSleep, NORMS.totalSleep);

  const results = document.getElementById('results');
  results.style.display = 'block';
  setTimeout(() => results.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
}

renderFields();
</script>
</body>
</html>
